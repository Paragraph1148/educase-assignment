version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Production Stack — AWS EC2
# DB is AWS RDS (external), so only the API container runs here.
# Usage: docker-compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    image: ${DOCKER_IMAGE:-reallygoodusr/school-management-api}:${IMAGE_TAG:-latest}
    container_name: school_api_prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST} # AWS RDS endpoint
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-school_management}
    ports:
      - "3000:3000"
    # Optional: mount a .env file on the EC2 instance instead of inline env vars
    # env_file:
    #   - /home/ec2-user/school-api.env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
