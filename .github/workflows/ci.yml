name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"
  IMAGE_NAME: school-management-api

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: school_management_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: |
          until mysqladmin ping -h 127.0.0.1 -u root -ptestpassword --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
      - run: mysql -h 127.0.0.1 -u root -ptestpassword school_management_test < docker/init.sql
      - run: npm run test:coverage
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpassword
          DB_NAME: school_management_test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/school-api
            cd /home/ubuntu/school-api

            echo "Pulling latest code..."
            git clone --depth 1 --branch main https://github.com/${{ github.repository }}.git . 2>/dev/null || git pull origin main

            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "Stopping old containers..."
            docker compose -f docker-compose.yml down --remove-orphans || true

            echo "Starting application with local MySQL..."
            docker compose -f docker-compose.yml up -d

            echo "Waiting for MySQL..."
            for i in {1..30}; do
              if docker exec school_db mysqladmin ping -u root -prootpassword --silent 2>/dev/null; then
                echo "✅ MySQL is healthy"
                break
              fi
              echo "Attempt $i/30..."
              sleep 2
            done

            sleep 5

            if docker ps | grep -q school_api; then
              echo "✅ API is running"
              docker logs school_api | tail -20
            else
              echo "❌ API failed to start"
              docker logs school_api
              exit 1
            fi

            docker image prune -f
            echo "✅ Deployment complete"
